<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3D9090"/>
      <stop offset="100%" stop-color="#1C4E4E"/>
    </linearGradient>
    <linearGradient id="gold" x1="210" y1="70" x2="290" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DCBC62"/>
      <stop offset="100%" stop-color="#B8862E"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="234" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- ====== Coffee Cup ====== -->
  <!-- Cup body (tapered with rounded bottom) -->
  <path d="
    M150 280
    L155 393 Q158 420 185 420
    L305 420 Q332 420 335 393
    L340 280 Z
  " fill="#FAF7F2" fill-opacity="0.93"/>

  <!-- Cup rim -->
  <rect x="142" y="270" width="206" height="18" rx="9" fill="#FFFFFF" fill-opacity="0.97"/>

  <!-- Cup handle -->
  <path d="M340 308 C392 308 392 392 340 392"
        fill="none" stroke="#FAF7F2" stroke-width="22" stroke-linecap="round" stroke-opacity="0.93"/>

  <!-- ====== Beamed Eighth Notes k (rising as steam) ====== -->
  <g filter="url(#glow)" opacity="0.95">
    <!-- Left note head -->
    <ellipse cx="202" cy="215" rx="27" ry="18"
             transform="rotate(-25,202,215)" fill="url(#gold)"/>
    <!-- Right note head -->
    <ellipse cx="278" cy="193" rx="27" ry="18"
             transform="rotate(-25,278,193)" fill="url(#gold)"/>

    <!-- Left stem -->
    <rect x="223" y="90" width="9" height="117" rx="4.5" fill="url(#gold)"/>
    <!-- Right stem -->
    <rect x="298" y="74" width="9" height="111" rx="4.5" fill="url(#gold)"/>

    <!-- Beam connecting the two stems -->
    <path d="M223 100 L307 83 L307 73 L223 90 Z" fill="url(#gold)"/>
  </g>

  <!-- Subtle steam wisps flanking the notes -->
  <path d="M172 252 Q166 238 174 222" fill="none" stroke="rgba(250,247,242,0.22)" stroke-width="4" stroke-linecap="round"/>
  <path d="M322 246 Q328 232 322 216" fill="none" stroke="rgba(250,247,242,0.22)" stroke-width="4" stroke-linecap="round"/>
</svg>
